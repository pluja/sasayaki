name: Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4

      - name: Build release APK
        run: ./gradlew assembleRelease -PversionTag=${{ github.ref_name }}

      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release.apk sasayaki-${{ github.ref_name }}.apk

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: sasayaki-${{ github.ref_name }}.apk
          generate_release_notes: true
